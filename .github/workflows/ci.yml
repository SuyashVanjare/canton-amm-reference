name: Canton AMM CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build & Test Daml Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DPM
        run: curl https://get.digitalasset.com/install/install.sh | sh

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Cache DPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/.dpm/packages
          key: ${{ runner.os }}-dpm-${{ hashFiles('**/daml.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dpm-

      - name: Build Daml project
        run: dpm build

      - name: Run Daml tests
        run: dpm test

  formal-verification:
    name: Run Formal Verification
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./verification
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run invariant checks
        run: python invariants.py